spring.application.name=Placemate
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.order_updates=true
spring.jpa.properties.hibernate.jdbc.order_inserts=true	


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_PASSWORD}


jwt.refreshExpirationTime=${JWT_REFRESH_EXPIRATION_TIME}
jwt.accessExpirationTime=${JWT_ACCESS_EXPIRATION_TIME}
jwt.secretKey=${JWT_SECRET_KEY}


frontend.url=${FRONTEND_URL}

spring.mail.password=${MAIL_PASSWORD}
spring.mail.username=${MAIL_USERNAME}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}


spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.ma.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000


spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=10000

otp.ttl=${OTP_TTL}


