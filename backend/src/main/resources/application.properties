spring.application.name=Placemate
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.port=8080

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.order_updates=true
spring.jpa.properties.hibernate.jdbc.order_inserts=true	


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_PASSWORD}


jwt.refreshExpirationTime=${JWT_REFRESH_EXPIRATION_TIME}
jwt.accessExpirationTime=${JWT_ACCESS_EXPIRATION_TIME}
jwt.secretKey=${JWT_SECRET_KEY}


frontend.url=${FRONTEND_URL}

spring.brevo.api.key=${BREVO_API_KEY}
brevo.base.uri=${BREVO_BASE_URI}
spring.sender.email=${MAIL_USERNAME}
spring.sender.name=${spring.application.name}


spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}


otp.ttl=${OTP_TTL}


